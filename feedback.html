<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Session Feedback – AI Emotion Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --primary: #4e73df;
      --success: #1cc88a;
      --danger: #e74a3b;
      --neutral: #858796;
      --light-bg: #f8f9fc;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(-45deg, #f5f7fb, #e8f0ff, #e6fff6, #f0f4ff);
      background-size: 400% 400%;
      animation: gradientBG 18s ease infinite;
      min-height: 100vh;
      color: #333;
    }

    @keyframes gradientBG {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .app-header {
      background: linear-gradient(90deg, var(--primary), var(--success), #36b9cc, var(--primary));
      background-size: 400% 400%;
      color: white;
      padding: 1.4rem 2rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      animation: headerFlow 12s ease infinite;
      position: relative;
      overflow: hidden;
    }

    @keyframes headerFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .app-header::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      animation: shine 9s infinite linear;
    }

    @keyframes shine {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }

    .container {
      max-width: 720px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    .feedback-card {
      background: rgba(255, 255, 255, 0.92) !important;
      backdrop-filter: blur(14px);
      border-radius: 1.25rem !important;
      border: none;
      box-shadow: 0 12px 40px rgba(0,0,0,0.10);
      padding: 2.5rem;
      animation: cardEntrance 0.9s ease-out forwards;
      opacity: 0;
    }

    @keyframes cardEntrance {
      0%   { opacity: 0; transform: translateY(40px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .form-title {
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 1.5rem;
      text-align: center;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .star-container {
      font-size: 3rem;
      text-align: center;
      margin: 2rem 0;
    }

    .star {
      color: #ddd;
      cursor: pointer;
      transition: all 0.35s ease;
      margin: 0 6px;
    }

    .star:hover,
    .star.active {
      color: #ffc107;
      transform: scale(1.35) rotate(12deg);
    }

    .star.active {
      animation: starPop 0.5s ease;
    }

    @keyframes starPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.6); }
      100% { transform: scale(1.35); }
    }

    textarea.form-control {
      border-radius: 0.9rem;
      border: 1px solid #ced4da88;
      transition: all 0.3s ease;
    }

    textarea.form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.25rem rgba(78,115,223,0.18);
    }

    .btn-submit {
      background: linear-gradient(90deg, var(--primary), #3b5bb5);
      border: none;
      padding: 0.75rem 2rem;
      font-weight: 600;
      border-radius: 3rem;
      transition: all 0.4s ease;
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(78,115,223,0.35);
    }

    .success-message {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .success-box {
      background: white;
      border-radius: 1.2rem;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      transform: scale(0.7);
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .success-box.show {
      transform: scale(1);
      opacity: 1;
    }

    .success-icon {
      font-size: 4.5rem;
      color: var(--success);
      margin-bottom: 1.2rem;
      animation: bounceIn 1.2s ease;
    }

    @keyframes bounceIn {
      0%   { transform: scale(0.3); opacity: 0; }
      60%  { transform: scale(1.15); opacity: 1; }
      80%  { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: #6c757d;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.4);
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    @media (max-width: 576px) {
      .feedback-card { padding: 1.8rem 1.2rem; }
      .star-container { font-size: 2.6rem; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="container text-center">
      <h1 class="h3 mb-1">Session Feedback</h1>
      <p class="mb-0">Your opinion helps us support students better</p>
    </div>
  </header>

  <div class="container">
    <div class="feedback-card">
      <h2 class="form-title">How was your experience today?</h2>

      <div class="star-container">
        <span class="star" data-value="1">☆</span>
        <span class="star" data-value="2">☆</span>
        <span class="star" data-value="3">☆</span>
        <span class="star" data-value="4">☆</span>
        <span class="star" data-value="5">☆</span>
      </div>

      <div class="mb-4 text-center small text-muted" id="ratingText">
        Please select a rating
      </div>

      <div class="mb-4">
        <label for="feedbackComment" class="form-label fw-medium">Additional comments (optional)</label>
        <textarea class="form-control" id="feedbackComment" rows="5" placeholder="What worked well? What could be improved? ..."></textarea>
      </div>

      <button class="btn btn-submit w-100 text-white fw-semibold" id="submitBtn" disabled>
        Submit Feedback
      </button>
    </div>
  </div>

  <!-- Success overlay -->
  <div class="success-message" id="successOverlay">
    <div class="success-box" id="successBox">
      <div class="success-icon">✓</div>
      <h4 class="mb-3">Thank You!</h4>
      <p class="text-muted mb-4">Your feedback has been received successfully.<br>We truly appreciate your input.</p>
      <button class="btn btn-outline-primary" onclick="window.location.href='index.html'">Back to Dashboard</button>
    </div>
  </div>

  <footer>
    Demo UI – AI Emotion & Behaviour Support for Autism • © 2026
  </footer>

  <script>
    const stars = document.querySelectorAll('.star');
    const ratingText = document.getElementById('ratingText');
    const submitBtn = document.getElementById('submitBtn');
    const comment = document.getElementById('feedbackComment');
    const successOverlay = document.getElementById('successOverlay');
    const successBox = document.getElementById('successBox');

    let selectedRating = 0;

    stars.forEach(star => {
      star.addEventListener('click', () => {
        selectedRating = parseInt(star.dataset.value);
        updateStars();
        ratingText.textContent = `${selectedRating} out of 5 stars`;
        submitBtn.disabled = false;
      });

      star.addEventListener('mouseover', () => {
        highlightStars(parseInt(star.dataset.value));
      });

      star.addEventListener('mouseout', () => {
        if (selectedRating === 0) resetStars();
        else updateStars();
      });
    });

    function updateStars() {
      stars.forEach(s => {
        const val = parseInt(s.dataset.value);
        s.textContent = val <= selectedRating ? '★' : '☆';
        s.classList.toggle('active', val <= selectedRating);
      });
    }

    function highlightStars(rating) {
      stars.forEach(s => {
        const val = parseInt(s.dataset.value);
        s.textContent = val <= rating ? '★' : '☆';
        s.style.color = val <= rating ? '#ffc107' : '#ddd';
      });
    }

    function resetStars() {
      stars.forEach(s => {
        s.textContent = '☆';
        s.style.color = '#ddd';
      });
    }

    submitBtn.addEventListener('click', () => {
      const feedback = comment.value.trim();
      console.log(`Rating: ${selectedRating}/5 | Comment: ${feedback || '(none)'}`);
      
      // Show success animation
      successOverlay.style.display = 'flex';
      setTimeout(() => successBox.classList.add('show'), 100);
    });

    // Optional: close success on outside click
    successOverlay.addEventListener('click', (e) => {
      if (e.target === successOverlay) {
        successOverlay.style.display = 'none';
        successBox.classList.remove('show');
      }
    });
  </script>
</body>
</html>
