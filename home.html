<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – AI Emotion & Behaviour Support</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --primary: #4e73df;
      --success: #1cc88a;
      --danger: #e74a3b;
      --neutral: #858796;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(-45deg, #f5f7fb, #e8f0ff, #e6fff6, #f0f4ff);
      background-size: 400% 400%;
      animation: gradientBG 18s ease infinite;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes gradientBG {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .app-header {
      background: linear-gradient(90deg, var(--primary), var(--success), #36b9cc, var(--primary));
      background-size: 400% 400%;
      color: white;
      padding: 1.4rem 2rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      animation: headerFlow 12s ease infinite;
      position: relative;
      overflow: hidden;
    }

    @keyframes headerFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .app-header::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      animation: shine 9s infinite linear;
    }

    @keyframes shine {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }

    .login-container {
      max-width: 460px;
      width: 100%;
      margin: auto;
      padding: 2.5rem 2rem;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      border-radius: 1.25rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.10);
      animation: cardEntrance 0.9s ease-out forwards;
      opacity: 0;
      border: 1px solid rgba(78,115,223,0.12);
    }

    @keyframes cardEntrance {
      0%   { opacity: 0; transform: translateY(50px) scale(0.94); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .form-title {
      font-weight: 700;
      color: var(--primary);
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeInUp 1.1s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-label {
      font-weight: 500;
      color: #444;
    }

    .form-control {
      border-radius: 0.8rem;
      border: 1px solid #ced4da88;
      padding: 0.75rem 1.1rem;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.25rem rgba(78,115,223,0.18);
    }

    .btn-login {
      background: linear-gradient(90deg, var(--primary), #3b5bb5);
      border: none;
      padding: 0.8rem;
      font-weight: 600;
      border-radius: 3rem;
      transition: all 0.4s ease;
      width: 100%;
      margin-top: 1.2rem;
    }

    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(78,115,223,0.35);
    }

    .extra-links {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.95rem;
    }

    .extra-links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
    }

    .extra-links a:hover {
      color: #3b5bb5;
      text-decoration: underline;
    }

    footer {
      margin-top: auto;
      padding: 2rem 1rem;
      text-align: center;
      color: #6c757d;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.35);
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .alert {
      border-radius: 0.9rem;
      margin-bottom: 1.5rem;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 576px) {
      .login-container {
        margin: 2rem 1rem;
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1 class="h3 text-center mb-0">AI Emotion & Behaviour Support</h1>
    <p class="text-center mb-0 small">For Teachers & Caregivers</p>
  </header>

  <div class="login-container mt-5">
    <h2 class="form-title">Sign In</h2>

    <!-- Optional error/success message -->
    <div class="alert alert-danger d-none" id="errorMsg" role="alert">
      Invalid username or password. Please try again.
    </div>

    <form id="loginForm">
      <div class="mb-4">
        <label for="username" class="form-label">Username / Email</label>
        <input type="text" class="form-control" id="username" placeholder="teacher@example.com" required autofocus>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe">
          <label class="form-check-label small" for="rememberMe">
            Remember me
          </label>
        </div>
        <a href="#" class="small">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-login text-white fw-semibold" id="loginBtn">
        Login
      </button>
    </form>

    <div class="extra-links">
      <p class="mb-2">Don't have an account? <a href="#">Create one</a></p>
      <p class="mb-0"><a href="index.html">Continue as Guest (demo mode)</a></p>
    </div>
  </div>

  <footer>
    © 2026 AI Emotion & Behaviour Support • Demo System
  </footer>

  <script>
    // Simple client-side demo login simulation
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      // Very simple demo validation (in real app → send to backend)
      if (username && password.length >= 4) {
        // Success → redirect to main dashboard
        errorMsg.classList.add('d-none');
        loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Signing in...';
        loginBtn.disabled = true;

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1200);
      } else {
        errorMsg.textContent = "Please enter a valid username and password (at least 4 characters).";
        errorMsg.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
